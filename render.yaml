# Render Blueprint: https://render.com/docs/blueprint-spec
# Connect repo → New Blueprint Instance → select this file (or paste).
services:
  - type: web
    name: nexshop
    runtime: node
    rootDir: ecommerce/backend
    buildCommand: cd ../frontend && npm ci && npm run build && cd ../backend && npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
